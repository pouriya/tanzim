name: Publish to crates.io

on:
  push:
    tags:
      - "crate*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags: the release gate diffs against the previous
          # `crate*` tag to confirm every changed crate was bumped.
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Release gate (version check)
        run: make check-version

      - name: Verify
        run: make all

      # Publish in dependency order, one crate at a time, waiting 20s between
      # uploads for the index to settle. Versions already on crates.io are
      # skipped; if publish still fails with "already exists", log and continue.
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_SECRET_TOKEN }}
        run: |
          set -euo pipefail

          crates=(
            tanzim-source
            tanzim-testing
            tanzim-value
            tanzim-load
            tanzim-parse
            tanzim-merge
            tanzim-validate
            tanzim
          )

          version_of() {
            awk '
              /^\[package\]/ { in_pkg = 1; next }
              /^\[/ { in_pkg = 0 }
              in_pkg && /^version = "/ {
                line = $0
                sub(/^version = "/, "", line)
                sub(/".*$/, "", line)
                print line
                exit
              }
            ' "$1"
          }

          published() {
            local name vers path
            name="$(tr '[:upper:]' '[:lower:]' <<<"$1")"
            vers="$2"
            case ${#name} in
              1) path="1/$name" ;;
              2) path="2/$name" ;;
              3) path="3/${name:0:1}/$name" ;;
              *) path="${name:0:2}/${name:2:2}/$name" ;;
            esac
            curl -sf "https://index.crates.io/$path" \
              | jq -se --arg v "$vers" 'any(.[]; .vers == $v)' >/dev/null
          }

          failures=0
          published_any=0

          for crate in "${crates[@]}"; do
            manifest="crates/$crate/Cargo.toml"
            vers="$(version_of "$manifest")"

            if published "$crate" "$vers"; then
              echo "skip   $crate@$vers (already on crates.io)"
              continue
            fi

            echo "publish $crate@$vers"
            set +e
            output="$(cargo publish --manifest-path "$manifest" --all-features 2>&1)"
            status=$?
            set -e
            printf '%s\n' "$output"

            if [ "$status" -eq 0 ]; then
              published_any=1
              echo "ok     $crate@$vers"
              echo "waiting 20s for crates.io index"
              sleep 20
              continue
            fi

            if grep -Fq "already exists" <<<"$output"; then
              echo "skip   $crate@$vers (already exists on crates.io)"
              continue
            fi

            echo "error  $crate@$vers publish failed" >&2
            failures=$((failures + 1))
          done

          if [ "$failures" -ne 0 ]; then
            echo "error: $failures crate(s) failed to publish" >&2
            exit 1
          fi

          if [ "$published_any" -eq 0 ]; then
            echo "Nothing to publish."
          fi
