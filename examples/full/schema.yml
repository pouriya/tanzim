# Validation schemas, keyed by merged entry name (the file stems under etc/).
# Loaded with serde_yaml in main.rs and handed to ConfigBuilder::with_schemas, which runs
# them against the merged configuration after the merge stage.

bar:
  type: static_map
  allow_unknown: true
  fields:
    sqlite:
      required: true
      validator:
        type: static_map
        allow_unknown: true
        fields:
          file:
            required: true
            validator: { type: string, min_chars: 1 }
          recreate:
            required: false
            validator: { type: bool }

baz:
  type: static_map
  allow_unknown: true
  fields:
    logging:
      required: true
      validator:
        type: static_map
        allow_unknown: true
        fields:
          level:
            required: true
            validator: { type: enum, values: [trace, debug, info, warn, error] }
          output_serialize_format:
            required: false
            validator: { type: enum, values: [json, yaml, toml] }
          histogram_buckets:
            required: false
            validator: { type: list, items: { type: float } }

qux:
  type: static_map
  allow_unknown: true
  fields:
    https:
      required: true
      validator:
        type: static_map
        allow_unknown: true
        fields:
          insecure:
            required: true
            validator: { type: bool }
          follow_redirects:
            required: false
            validator: { type: bool }
          retries:
            required: false
            validator: { type: integer, min: 1 }
